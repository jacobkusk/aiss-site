name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Next.js build reads these at module load via the supabase client. Use
      # dummy values so the build graph resolves in CI — real values come from
      # Vercel env vars at deploy time.
      NEXT_PUBLIC_SUPABASE_URL: https://ci.example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  lint:
    name: lint (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Lint is surfaced but does not block merges today — the codebase has
    # pre-existing warnings that pre-date this workflow. Flip to a hard gate
    # once the backlog is cleared.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint
